<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0">
    <style>
        html,
        body,
        *,
        *::before,
        *::after {
            cursor: url('/assets/shared/cursor/cursor_frame_0.png') 0 0, none !important;
        }
    </style>
    <title>Gunbound Thor's Hammer - Game Room</title>
    <link rel="icon" type="image/x-icon" href="/assets/shared/favicon.ico">
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/game_room/game_room.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts/shared/ui_common.js"></script>
    <script src="/scripts/shared/buddy_common.js"></script>
    <script src="/scripts/shared/audio_manager.js"></script>
    <script src="/scripts/ui_effects.js"></script>
    <script src="/scripts/shared/avatar_pose_config.js"></script>
    <script src="/scripts/shared/avatar_preview_runtime.js"></script>
    <script src="/scripts/game_room/mobile_pose_config.js"></script>
    <script src="/scripts/game_room/game_room.js"></script>
</head>

<body>
    <div id="game-container">
        <div id="screen-transition" class="active opening run"></div>

        <div id="game-room-screen">
            <div id="game-room-room-number"></div>
            <div id="game-room-room-title"></div>
            <button id="btn-game-room-edit-title" type="button" aria-label="Edit room title"></button>
            <div id="game-room-server-title">Server name - Gunbound Classic</div>

            <div id="game-room-slot-a1" class="game-room-slot team-a"></div>
            <div id="game-room-slot-a2" class="game-room-slot team-a"></div>
            <div id="game-room-slot-a3" class="game-room-slot team-a"></div>
            <div id="game-room-slot-a4" class="game-room-slot team-a"></div>

            <div id="game-room-slot-b1" class="game-room-slot team-b"></div>
            <div id="game-room-slot-b2" class="game-room-slot team-b"></div>
            <div id="game-room-slot-b3" class="game-room-slot team-b"></div>
            <div id="game-room-slot-b4" class="game-room-slot team-b"></div>

            <div id="game-room-map-panel">
                <button id="btn-game-room-map-prev" class="game-room-map-btn"></button>
                <div id="game-room-map-card"></div>
                <button id="btn-game-room-map-next" class="game-room-map-btn"></button>
            </div>

            <div id="game-room-rule-buttons">
                <button id="btn-game-room-solo" class="game-room-rule-btn"></button>
                <button id="btn-game-room-4v4" class="game-room-rule-btn"></button>
                <button id="btn-game-room-aside" class="game-room-rule-btn"></button>
                <button id="btn-game-room-bigbomb" class="game-room-rule-btn"></button>
                <button id="btn-game-room-basic" class="game-room-rule-btn"></button>
                <button id="btn-game-room-death56" class="game-room-rule-btn"></button>
            </div>

            <div id="game-room-chat-feed"></div>
            <button id="btn-game-room-chatting" type="button" aria-label="Open room chat"></button>
            <input type="text" id="game-room-chat-input" maxlength="100" autocomplete="off">

            <div id="game-room-mobile-grid"></div>
            <div id="game-room-mobile-preview"></div>

            <div id="game-room-item-slots">
                <button class="game-room-item-slot" data-slot-index="0"></button>
                <button class="game-room-item-slot" data-slot-index="1"></button>
                <button class="game-room-item-slot" data-slot-index="2"></button>
                <button class="game-room-item-slot" data-slot-index="3"></button>
                <button class="game-room-item-slot" data-slot-index="4"></button>
                <button class="game-room-item-slot" data-slot-index="5"></button>
            </div>

            <div id="game-room-item-grid">
                <button class="game-room-item-btn item-1"></button>
                <button class="game-room-item-btn item-2"></button>
                <button class="game-room-item-btn item-3"></button>
                <button class="game-room-item-btn item-4"></button>
                <button class="game-room-item-btn item-5"></button>
                <button class="game-room-item-btn item-6"></button>
                <button class="game-room-item-btn item-7"></button>
                <button class="game-room-item-btn item-8"></button>
                <button class="game-room-item-btn item-9"></button>
            </div>
            <button id="btn-game-room-item-up" class="game-room-item-scroll"></button>
            <button id="btn-game-room-item-down" class="game-room-item-scroll"></button>

            <button id="btn-game-room-exit" class="game-room-action-btn"></button>
            <button id="btn-game-room-buddy" class="game-room-action-btn"></button>
            <button id="btn-game-room-change" class="game-room-action-btn"></button>
            <button id="btn-game-room-start" class="game-room-action-btn"></button>
        </div>

        <div id="game-room-title-popup" class="hidden">
            <div class="game-room-title-popup-header"></div>
            <div class="game-room-title-popup-body">
                <input type="text" id="game-room-title-input" maxlength="30" autocomplete="off">
                <div id="game-room-title-cursor"></div>
                <span id="game-room-title-input-ghost"
                    style="visibility: hidden; white-space: pre; position: absolute; font-family: var(--gbth-ui-font); font-size: 11px;"></span>
                <button id="btn-game-room-title-ok" type="button"></button>
                <button id="btn-game-room-title-cancel" type="button"></button>
            </div>
        </div>

        <div id="buddy-list-panel" class="lobby-panel hidden">
            <div class="buddy-header">
                <div class="buddy-icon"></div>
                <div class="buddy-status-box">
                    <span id="buddy-online-count">0</span><span id="buddy-total-count">0</span>
                </div>
                <button id="btn-buddy-plus" class="buddy-mini-btn"></button>
                <button id="btn-buddy-del" class="buddy-mini-btn"></button>
                <button id="btn-buddy-exit" class="buddy-mini-btn"></button>
            </div>
            <div class="buddy-list-content">
                <!-- Buddy list items will be injected here -->
            </div>
            <div class="buddy-scroll-controls">
                <button class="buddy-scroll-button btn-buddy-scroll-up disabled"></button>
                <button class="buddy-scroll-button btn-buddy-scroll-down disabled"></button>
            </div>
        </div>

        <div id="add-buddy-popup" class="hidden">
            <div class="buddy-window-header"></div>
            <div class="buddy-window-content">
                <div id="add-buddy-text-box">
                    To add a friend, type his nickname below.
                </div>
                <input type="text" id="add-buddy-input" maxlength="20" autocomplete="off">
                <div id="add-buddy-cursor"></div>
                <span id="add-buddy-input-ghost"
                    style="visibility: hidden; white-space: pre; position: absolute; font-family: var(--gbth-ui-font); font-size: 11px;"></span>
                <button id="btn-add-buddy-ok" class="buddy-window-btn"></button>
                <button id="btn-add-buddy-close" class="buddy-window-btn"></button>
            </div>
        </div>

        <div id="buddy-alert-popup" class="hidden">
            <div class="buddy-window-header"></div>
            <div class="buddy-window-content">
                <div id="buddy-alert-text-box"></div>
                <button id="btn-buddy-alert-yes" class="buddy-alert-btn"></button>
                <button id="btn-buddy-alert-no" class="buddy-alert-btn hidden"></button>
            </div>
        </div>

        <div id="buddy-chat-window" class="hidden">
            <div class="buddy-chat-header">
                <span id="buddy-chat-nickname"></span>
                <button id="btn-buddy-chat-close"></button>
            </div>
            <div class="buddy-chat-content">
                <div id="buddy-chat-messages"></div>
            </div>
            <div class="buddy-chat-scroll-controls">
                <button class="buddy-chat-scroll-up disabled"></button>
                <button class="buddy-chat-scroll-down disabled"></button>
            </div>
            <div class="buddy-chat-input-container">
                <input type="text" id="buddy-chat-input" maxlength="100" autocomplete="off">
                <div id="buddy-chat-cursor"></div>
                <span id="buddy-chat-input-ghost"
                    style="visibility: hidden; white-space: pre; position: absolute; font-family: var(--gbth-ui-font); font-size: 11px;"></span>
            </div>
        </div>
    </div>

    <div id="error-overlay" class="hidden">
        <div id="error-popup">
            <div id="error-title">System Error</div>
            <div id="error-message">An unexpected error occurred. Please try again later.</div>
            <button id="error-confirm-btn"></button>
        </div>
    </div>
</body>

</html>
