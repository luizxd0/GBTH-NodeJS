<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0">
    <title>Gunbound Thor's Hammer - Avatar Shop</title>
    <link rel="icon" type="image/x-icon" href="/assets/shared/favicon.ico">
    <link rel="stylesheet" href="/styles/style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="/scripts/shared/ui_common.js"></script>
    <script src="/scripts/shared/avatar_preview_runtime.js"></script>
    <script src="/scripts/ui_effects.js"></script>
    <script src="/scripts/avatar_shop.js"></script>
</head>

<body>
    <div id="game-container">
        <div id="screen-transition" class="active opening run"></div>

        <div id="avatar-shop-screen">
            <div id="user-info-panel">
                <div class="user-info-top">
                    <img id="lobby-rank-icon" src="/assets/shared/rank1/rank1_frame_24.png" alt="Rank">
                    <div class="name-guild-group">
                        <span id="lobby-guild"></span>
                        <span id="lobby-nickname"></span>
                    </div>
                    <div class="rank-gp-group">
                        <div class="ranking-row">
                            <span class="label">Ranking</span>
                            <span id="lobby-ranking-value"></span>
                        </div>
                        <div class="gp-row">
                            <span id="lobby-gp"></span>
                        </div>
                    </div>
                </div>
                <div class="user-info-bottom">
                    <span id="lobby-gold"></span>
                    <span id="lobby-cash"></span>
                </div>
            </div>

            <div id="avatar-shop-myavatar-frame"></div>
            <div id="avatar-shop-exitem-frame"></div>

            <button id="btn-store-cashcharge" class="avatar-shop-btn"></button>
            <button id="btn-store-main-up" class="avatar-shop-btn"></button>
            <button id="btn-store-main-down" class="avatar-shop-btn"></button>
            <div id="avatar-shop-list" aria-label="Avatar shop list"></div>

            <button id="btn-store-cap" class="avatar-shop-btn avatar-shop-toggle active"></button>
            <button id="btn-store-cloth" class="avatar-shop-btn avatar-shop-toggle"></button>
            <button id="btn-store-glasse" class="avatar-shop-btn avatar-shop-toggle"></button>
            <button id="btn-store-flag" class="avatar-shop-btn avatar-shop-toggle"></button>
            <button id="btn-store-setitem" class="avatar-shop-btn avatar-shop-toggle"></button>
            <button id="btn-store-exitem" class="avatar-shop-btn avatar-shop-toggle"></button>

            <button id="btn-store-puton" class="avatar-shop-btn"></button>
            <button id="btn-store-buy" class="avatar-shop-btn"></button>

            <button id="btn-store-exit" class="avatar-shop-btn"></button>
            <button id="btn-store-buddy" class="avatar-shop-btn"></button>
        </div>
    </div>
</body>

</html>
