<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0">
    <title>Gunbound Thor's Hammer - Lobby</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="ui_effects.js"></script>
    <script src="lobby.js"></script>
</head>

<body>
    <div id="game-container">
        <div id="screen-transition" class="active opening run"></div>
        <div id="lobby-screen">
            <!-- Scenery and frames are baked into gamelist_back_frame_0 -->

            <!-- Top Section Panels -->
            <!-- Unified User Info Panel -->
            <div id="user-info-panel">
                <div class="user-info-top">
                    <img id="lobby-rank-icon" src="/assets/rank1/rank1_frame_24.png" alt="Rank">
                    <div class="name-guild-group">
                        <span id="lobby-guild"></span>
                        <span id="lobby-nickname"></span>
                    </div>
                    <div class="rank-gp-group">
                        <div class="ranking-row">
                            <span class="label">Ranking</span>
                            <span id="lobby-ranking-value"></span>
                        </div>
                        <div class="gp-row">
                            <span id="lobby-gp"></span>
                        </div>
                    </div>
                </div>
                <div class="user-info-bottom">
                    <span id="lobby-gold"></span>
                    <span id="lobby-cash"></span>
                </div>
            </div>

            <div id="buddy-list-panel" class="lobby-panel">
                <div class="buddy-header">
                    <div class="buddy-icon"></div>
                    <div class="buddy-status-box">
                        <span id="buddy-online-count">0</span><span id="buddy-total-count">0</span>
                    </div>
                    <button id="btn-buddy-plus" class="buddy-mini-btn"></button>
                    <button id="btn-buddy-del" class="buddy-mini-btn"></button>
                    <button id="btn-buddy-exit" class="buddy-mini-btn"></button>
                </div>
                <div class="buddy-list-content">
                    <!-- Buddy list items will be injected here -->
                </div>
                <div class="buddy-scroll-controls">
                    <button class="buddy-scroll-button btn-buddy-scroll-up disabled"></button>
                    <button class="buddy-scroll-button btn-buddy-scroll-down disabled"></button>
                </div>
            </div>

            <!-- Middle Navigation Buttons -->
            <button id="btn-view-all" class="nav-btn"></button>
            <button id="btn-waiting" class="nav-btn"></button>
            <button id="btn-nav-prev" class="nav-btn-mini"></button>
            <button id="btn-nav-next" class="nav-btn-mini"></button>
            <button id="btn-friends" class="nav-btn"></button>
            <button id="btn-goto" class="nav-btn"></button>

            <!-- Channel Selection Tabs -->
            <div id="channel-tabs-container">
                <div class="ch-buttons">
                    <button class="ch-btn active" data-channel="1" id="ch-btn-1"></button>
                    <button class="ch-btn" data-channel="2" id="ch-btn-2"></button>
                    <button class="ch-btn" data-channel="3" id="ch-btn-3"></button>
                    <button class="ch-btn" data-channel="4" id="ch-btn-4"></button>
                    <button class="ch-btn" data-channel="5" id="ch-btn-5"></button>
                    <button class="ch-btn" data-channel="6" id="ch-btn-6"></button>
                    <button class="ch-btn" data-channel="7" id="ch-btn-7"></button>
                    <button class="ch-btn" data-channel="8" id="ch-btn-8"></button>
                </div>
            </div>

            <!-- Main Frames -->
            <div id="gamelist-chat" class="lobby-frame">
                <div id="chat-messages-content"></div>
                <div class="chat-scroll-controls">
                    <button class="chat-scroll-button btn-chat-scroll-up disabled"></button>
                    <button class="chat-scroll-button btn-chat-scroll-down disabled"></button>
                </div>
                <input type="text" id="chat-input" maxlength="100" autocomplete="off">
                <div id="chat-cursor"></div>
                <!-- Hidden span to measure text width for cursor positioning -->
                <span id="chat-input-ghost"
                    style="visibility: hidden; white-space: pre; position: absolute; font-family: Arial, sans-serif; font-size: 11px;"></span>
            </div>

            <div id="gamelist-channel" class="lobby-frame">
                <div id="channel-list-content"></div>
                <div class="channel-scroll-controls">
                    <button class="channel-scroll-button btn-channel-scroll-up disabled"></button>
                    <button class="channel-scroll-button btn-channel-scroll-down disabled"></button>
                </div>
            </div>

            <!-- Bottom Action Buttons -->
            <button id="btn-lobby-exit" class="bottom-btn"></button>
            <button id="btn-lobby-buddy" class="bottom-btn"></button>
            <button id="btn-lobby-ranking" class="bottom-btn"></button>
            <button id="btn-lobby-avatar" class="bottom-btn"></button>
            <button id="btn-lobby-create" class="bottom-btn"></button>
            <button id="btn-lobby-join" class="bottom-btn"></button>

            <!-- Add Buddy Popup (Internal to scale with lobby) -->
            <div id="add-buddy-popup" class="hidden">
                <div class="buddy-window-header"></div>
                <div class="buddy-window-content">
                    <div id="add-buddy-text-box">
                        To add a friend, type his nickname below.
                    </div>
                    <input type="text" id="add-buddy-input" maxlength="20" autocomplete="off">
                    <div id="add-buddy-cursor"></div>
                    <!-- Hidden span to measure text width for cursor positioning -->
                    <span id="add-buddy-input-ghost"
                        style="visibility: hidden; white-space: pre; position: absolute; font-family: Arial, sans-serif; font-size: 11px;"></span>
                    <button id="btn-add-buddy-ok" class="buddy-window-btn"></button>
                    <button id="btn-add-buddy-close" class="buddy-window-btn"></button>
                </div>
            </div>

            <!-- Already Friends / Buddy Alert Popup -->
            <div id="buddy-alert-popup" class="hidden">
                <div class="buddy-window-header"></div>
                <div class="buddy-window-content">
                    <div id="buddy-alert-text-box">
                        'Nickname' already exists in your Buddy list.
                    </div>
                    <button id="btn-buddy-alert-yes" class="buddy-alert-btn"></button>
                    <button id="btn-buddy-alert-no" class="buddy-alert-btn hidden"></button>
                </div>
            </div>

            <!-- Buddy Chat Window -->
            <div id="buddy-chat-window" class="hidden">
                <div class="buddy-chat-header">
                    <span id="buddy-chat-nickname"></span>
                    <button id="btn-buddy-chat-close"></button>
                </div>
                <div class="buddy-chat-content">
                    <div id="buddy-chat-messages"></div>
                </div>
                <div class="buddy-chat-scroll-controls">
                    <button class="buddy-chat-scroll-up disabled"></button>
                    <button class="buddy-chat-scroll-down disabled"></button>
                </div>
                <div class="buddy-chat-input-container">
                    <input type="text" id="buddy-chat-input" maxlength="100" autocomplete="off">
                    <div id="buddy-chat-cursor"></div>
                    <span id="buddy-chat-input-ghost"
                        style="visibility: hidden; white-space: pre; position: absolute; font-family: Arial, sans-serif; font-size: 11px;"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Error Popup -->
    <div id="error-overlay" class="hidden">
        <div id="error-popup">
            <div id="error-title">System Error</div>
            <div id="error-message">An unexpected error occurred. Please try again later.</div>
            <button id="error-confirm-btn"></button>
        </div>
    </div>
</body>

</html>
